# ─────────────────────────────────────────────────────────────────────────────
# CodeShield AI — Weekly Security Report Workflow
# Runs every Monday at 08:00 UTC and generates a security trends report.
# ─────────────────────────────────────────────────────────────────────────────

name: 📊 Weekly Security Report

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  weekly-report:
    name: Generate Weekly Security Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install VibeGuard
        working-directory: vibeguard
        run: |
          npm ci --prefer-offline 2>/dev/null || true
          cd core && npm ci --prefer-offline && npm run build 2>/dev/null || true

      - name: 🔍 Run Full Repository Scan
        id: scan
        run: |
          # Run scan
          cd vibeguard && node cli/dist/index.js scan ../ \
            --format json --output ../weekly-report.json \
            --ignore "node_modules,dist,build,.git" 2>&1 || true

          if [ ! -f "weekly-report.json" ]; then
            echo '{"score":{"score":100,"grade":"A"},"summary":{"CRITICAL":0,"HIGH":0,"MEDIUM":0,"LOW":0},"vulnerabilities":[],"stats":{"files_scanned":0,"lines_scanned":0}}' > weekly-report.json
          fi

          cd ..
          SCORE=$(jq -r '.score.score // 100' weekly-report.json)
          GRADE=$(jq -r '.score.grade // "A"' weekly-report.json)
          CRITICAL=$(jq -r '.summary.CRITICAL // 0' weekly-report.json)
          HIGH=$(jq -r '.summary.HIGH // 0' weekly-report.json)
          MEDIUM=$(jq -r '.summary.MEDIUM // 0' weekly-report.json)
          LOW=$(jq -r '.summary.LOW // 0' weekly-report.json)
          FILES=$(jq -r '.stats.files_scanned // 0' weekly-report.json)
          LINES=$(jq -r '.stats.lines_scanned // 0' weekly-report.json)
          TOTAL=$(jq -r '.vulnerabilities | length // 0' weekly-report.json)

          echo "score=$SCORE"       >> $GITHUB_OUTPUT
          echo "grade=$GRADE"       >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH"         >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM"     >> $GITHUB_OUTPUT
          echo "low=$LOW"           >> $GITHUB_OUTPUT
          echo "files=$FILES"       >> $GITHUB_OUTPUT
          echo "lines=$LINES"       >> $GITHUB_OUTPUT
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT

      - name: 📤 Upload Weekly Report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-report-${{ github.run_number }}
          path: weekly-report.json
          retention-days: 90

      - name: 📝 Create Weekly Security Issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const score = '${{ steps.scan.outputs.score }}';
            const grade = '${{ steps.scan.outputs.grade }}';
            const scoreIcon = score >= 90 ? '🟢' : score >= 70 ? '🟡' : '🔴';

            const body = `## 🛡️ Weekly Security Report — ${today}

            ${scoreIcon} **Security Score: ${score}/100** (Grade **${grade}**)

            ### Vulnerability Summary

            | Severity | Count | Status |
            |----------|-------|--------|
            | 🔴 Critical | ${{ steps.scan.outputs.critical }} | ${parseInt('${{ steps.scan.outputs.critical }}') > 0 ? '❌ Action Required' : '✅ Clean'} |
            | 🟠 High | ${{ steps.scan.outputs.high }} | ${parseInt('${{ steps.scan.outputs.high }}') > 0 ? '⚠️ Review Needed' : '✅ Clean'} |
            | 🟡 Medium | ${{ steps.scan.outputs.medium }} | ${parseInt('${{ steps.scan.outputs.medium }}') > 0 ? '📋 Track' : '✅ Clean'} |
            | 🔵 Low | ${{ steps.scan.outputs.low }} | ${parseInt('${{ steps.scan.outputs.low }}') > 0 ? '📝 Note' : '✅ Clean'} |

            ### Scan Statistics
            - 📁 Files Scanned: **${{ steps.scan.outputs.files }}**
            - 📄 Lines Analyzed: **${{ steps.scan.outputs.lines }}**
            - 🐛 Total Issues: **${{ steps.scan.outputs.total }}**

            ### Recommended Actions
            ${parseInt('${{ steps.scan.outputs.critical }}') > 0 ? '1. 🚨 **Immediately** address all CRITICAL vulnerabilities\n' : ''}${parseInt('${{ steps.scan.outputs.high }}') > 0 ? '2. 📅 Schedule remediation for HIGH severity issues this sprint\n' : ''}${parseInt('${{ steps.scan.outputs.total }}') === 0 ? '✅ **Excellent!** No security issues detected this week. Keep up the great work!\n' : ''}
            ---
            *Generated by [CodeShield AI](https://github.com/mohamedabdelmouty/CodeShield-AI) on ${today}*
            *[View Full Report Artifact](../../actions/runs/${{ github.run_id }})*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🛡️ Weekly Security Report — ${today} (Score: ${score}/100)`,
              body,
              labels: ['security', 'automated-report'],
            });
